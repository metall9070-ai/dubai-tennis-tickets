name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──
  backend-test:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[backend]') ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'False'
        run: pytest

  # ── Frontend: Lint + Typecheck + Unit Tests ──
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test
        env:
          NEXT_PUBLIC_SITE_CODE: tennis
          NEXT_PUBLIC_SITE_URL: https://dubaitennistickets.com
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # ── Frontend: E2E (Playwright) ──
  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SITE_CODE: tennis
          NEXT_PUBLIC_SITE_URL: https://dubaitennistickets.com
          NEXT_PUBLIC_API_BASE_URL: https://platform-backend-production-f268.up.railway.app

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
